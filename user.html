    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 50%, #f1f8e9 100%);
            --glass-bg: rgba(255, 255, 255, 0.55);
            --glass-border: rgba(255, 255, 255, 0.4);
            --glass-shadow: 0 8px 32px 0 rgba(139, 195, 74, 0.15);
            --primary-green: #2e7d32;
            --accent-yellow: #fff9c4;
            --accent-orange: #ffe082;
            --text-main: #1b5e20;
            --text-sub: #33691e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg-gradient); background-attachment: fixed; color: var(--text-main); min-height: 100vh; padding: 2rem 1.5rem; }

        .container { max-width: 800px; margin: 0 auto; }

        header {
            background: var(--glass-bg);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); border-radius: 16px;
            padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center;
            box-shadow: var(--glass-shadow); margin-bottom: 2rem;
            animation: fadeInUp 0.5s ease-out;
        }

        .lang-btn { background: var(--primary-green); color: #fff; border: none; padding: 0.5rem 1rem; border-radius: 20px; font-weight: 600; cursor: pointer; }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); border-radius: 24px;
            padding: 2.5rem; box-shadow: var(--glass-shadow);
            animation: fadeInUp 0.6s ease-out; margin-bottom: 2rem;
        }

        h2 { margin-bottom: 1.5rem; font-size: 1.4rem; border-left: 4px solid var(--primary-green); padding-left: 0.75rem; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
        .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
        label { font-size: 0.95rem; font-weight: 600; }
        .form-control {
            width: 100%; background: rgba(255, 255, 255, 0.6); border: 1px solid var(--glass-border);
            border-radius: 12px; padding: 0.9rem; font-size: 1rem; color: var(--text-main); outline: none; transition: all 0.3s;
        }
        .form-control:focus { border-color: var(--primary-green); background: rgba(255, 255, 255, 0.9); }

        .btn-submit {
            background: linear-gradient(135deg, var(--primary-green), #43a047); color: white;
            border: none; padding: 1rem 2rem; border-radius: 12px; font-size: 1rem; font-weight: 600;
            cursor: pointer; transition: all 0.3s; width: 100%; box-shadow: 0 4px 12px rgba(46,125,50,0.2);
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(46,125,50,0.3); }

        /* --- DYNAMIC OUTPUT CROPS GRID --- */
        .crops-section { display: none; margin-top: 1rem; }
        .crops-section.active { display: block; animation: fadeInUp 0.5s ease-out; }
        .crops-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.25rem; margin-top: 1rem; }
        
        .crop-card {
            background: rgba(255, 255, 255, 0.45); border: 1px solid var(--glass-border);
            border-radius: 16px; padding: 1.25rem; cursor: pointer; text-align: center;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; gap: 0.5rem;
        }
        .crop-card:hover { transform: translateY(-4px) scale(1.02); background: #ffffff; border-color: var(--primary-green); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        
        .crop-icon { font-size: 2.5rem; }
        .crop-name { font-weight: 700; font-size: 1.1rem; }
        .success-rate { background: var(--accent-orange); color: var(--text-main); font-weight: 700; padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.85rem; display: inline-block; margin: 0 auto; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } }
        @media (max-width: 480px) { .glass-card { padding: 1.5rem; } body { padding: 1rem; } }
    </style>
</head>

            }
        };

        let currentLang = localStorage.getItem('farmerLang') || 'en';

        function applyTranslations() {
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if (dictionary[currentLang][key]) el.textContent = dictionary[currentLang][key];
            });
            document.getElementById('langToggle').textContent = currentLang === 'en' ? 'தமிழ்' : 'English';
        }

        document.getElementById('langToggle').addEventListener('click', () => {
            currentLang = currentLang === 'en' ? 'ta' : 'en';
            localStorage.setItem('farmerLang', currentLang);
            applyTranslations();
            if(document.getElementById('cropsSection').classList.contains('active')) {
                renderCropCards();
            }
        });

        applyTranslations();

        // --- FORM HANDLING & CROP INJECTION LOGIC ---
        document.getElementById('landForm').addEventListener('submit', (e) => {
            e.preventDefault();
            renderCropCards();
            document.getElementById('cropsSection').classList.add('active');
            document.getElementById('cropsSection').scrollIntoView({ behavior: 'smooth' });
        });

        function renderCropCards() {
            const grid = document.getElementById('cropsGrid');
            const selectedDistrict = document.getElementById('district').value;
            grid.innerHTML = '';
            
            // Extract targeted structural crops matching keys cleanly
            const dynamicCropList = tnCropDatabase[selectedDistrict] || defaultCropsFallback;

            dynamicCropList.forEach(crop => {
                const card = document.createElement('div');
                card.className = 'crop-card';
                card.innerHTML = `
                    <div class="crop-icon">${crop.icon}</div>
                    <div class="crop-name">${currentLang === 'en' ? crop.en : crop.ta}</div>
                    <div><span class="success-rate">${crop.rate} Success</span></div>
                `;
                
                card.addEventListener('click', () => {
                    // Set up persistent tracking storage strings for output.html loading cycles
                    localStorage.setItem('selectedCropEn', crop.en);
                    localStorage.setItem('selectedCropTa', crop.ta);
                    localStorage.setItem('selectedCropIcon', crop.icon);
                    localStorage.setItem('selectedCropRate', crop.rate);
                    localStorage.setItem('selectedDistrict', selectedDistrict);
                    localStorage.setItem('selectedAcres', document.getElementById('acres').value);
                    window.location.href = 'output.html';
                });
                grid.appendChild(card);
            });
        }
